# Server
server.port=${PORT:8080}

# Database - uses environment variable on Render
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/employeedb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://your-frontend.vercel.app}

# Logging
logging.level.com.example.employeeapi=INFO
logging.level.org.springframework.security=WARN
