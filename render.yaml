services:
  - type: web
    name: employee-api
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/employee-api-1.0.0.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: employee-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: employee-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: employee-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
      - key: PORT
        value: 8080

databases:
  - name: employee-db
    databaseName: employeedb
    user: employeeapi
    plan: free
